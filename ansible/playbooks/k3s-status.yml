---
- name: Check k3s cluster status
  hosts: k3s_masters
  tasks:
    - name: Get cluster nodes
      command: k3s kubectl get nodes -o wide
      register: cluster_nodes
      become: yes
      
    - name: Get cluster pods
      command: k3s kubectl get pods --all-namespaces
      register: cluster_pods
      become: yes
      
    - name: Get edge-cloud namespace status
      command: k3s kubectl get all -n edge-cloud
      register: edge_namespace
      become: yes
      ignore_errors: yes
      
    - name: Display cluster status
      debug:
        msg: |
          === CLUSTER NODES ===
          {{ cluster_nodes.stdout }}
          
          === EDGE-CLOUD NAMESPACE ===
          {{ edge_namespace.stdout if edge_namespace.rc == 0 else 'Namespace not found or empty' }}
          
    - name: Get cluster resource usage
      command: k3s kubectl top nodes
      register: resource_usage
      become: yes
      ignore_errors: yes
      
    - name: Display resource usage
      debug:
        msg: |
          === RESOURCE USAGE ===
          {{ resource_usage.stdout if resource_usage.rc == 0 else 'Metrics server not available' }}
      when: resource_usage is defined
apiVersion: v1
kind: Namespace
metadata:
  name: edge-cloud
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-gateway-config
  namespace: edge-cloud
data:
  nginx.conf: |
    events {
      worker_connections 4096;
    }
    http {
      upstream local_apps {
        server app-server.edge-cloud.svc.cluster.local:8080;
      }
      
      server {
        listen 80;
        
        # Default location - proxy to app servers
        location / {
          proxy_pass http://local_apps;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Health check endpoint
        location /health {
          return 200 "OK\n";
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: edge-gateway
  namespace: edge-cloud
spec:
  selector:
    matchLabels:
      app: edge-gateway
  template:
    metadata:
      labels:
        app: edge-gateway
    spec:
      nodeSelector:
        kubernetes.io/hostname: pifive0
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: cache
          mountPath: /var/cache/nginx
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
      volumes:
      - name: config
        configMap:
          name: edge-gateway-config
      - name: cache
        hostPath:
          path: /var/cache/edge-nginx
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: edge-gateway
  namespace: edge-cloud
spec:
  type: NodePort
  selector:
    app: edge-gateway
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
  namespace: edge-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-server
  template:
    metadata:
      labels:
        app: app-server
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - app-server
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      containers:
      - name: app
        image: node:alpine
        command: ["/bin/sh"]
        args: ["-c", "echo 'const http = require(\"http\"); http.createServer((req, res) => { res.writeHead(200); res.end(\"Edge node: \" + process.env.HOSTNAME); }).listen(8080);' > server.js && node server.js"]
        ports:
        - containerPort: 8080
        env:
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-server
  namespace: edge-cloud
spec:
  selector:
    app: app-server
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: s3-sync
  namespace: edge-cloud
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: aws-cli
            image: amazon/aws-cli
            command:
            - /bin/sh
            - -c
            - |
              # Sync local data to S3
              aws s3 sync /data s3://edge-backup-${CLUSTER_NAME}/ --delete
              # Pull configuration updates
              aws s3 cp s3://edge-config-${CLUSTER_NAME}/config.json /config/
            env:
            - name: CLUSTER_NAME
              value: "picluster"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
          restartPolicy: OnFailure
          volumes:
          - name: data
            hostPath:
              path: /var/edge-data
          - name: config
            hostPath:
              path: /etc/edge-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-edge
  namespace: edge-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-edge
  template:
    metadata:
      labels:
        app: prometheus-edge
    spec:
      nodeSelector:
        kubernetes.io/hostname: piiv2
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/usr/share/prometheus/console_libraries
        - --web.console.templates=/usr/share/prometheus/consoles
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        hostPath:
          path: /var/prometheus-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: edge-cloud
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      external_labels:
        cluster: 'edge'
        region: 'on-prem'
    
    remote_write:
      - url: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-xxxxx/api/v1/remote_write
        sigv4:
          region: us-east-1
        queue_config:
          capacity: 10000
          max_shards: 5
          min_shards: 1
    
    scrape_configs:
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - source_labels: [__address__]
          regex: '([^:]+):(.*)'
          target_label: __address__
          replacement: '${1}:10250'
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true